<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini OCR Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #result { white-space: pre-wrap; background: #eee; padding: 15px; margin-top: 20px; border-left: 5px solid #333; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Gemini OCR (Fixed)</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="runOCR()">텍스트 추출</button>
    <div id="result">결과가 여기에 표시됩니다.</div>

    <script>
        const API_KEY = "AIzaSyBlj3Vhwbys_DtlZI9mIlL76MiEe5AOWDI"; 
        // v1beta 대신 v1을 시도해보고, 모델명도 확인합니다.
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function fileToGenerativePart(file) {
            const base64EncodedDataPromise = new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            return { inline_data: { data: await base64EncodedDataPromise, mime_type: file.type } };
        }

        async function runOCR() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');

            if (!fileInput.files[0]) return alert("파일을 선택하세요.");

            resultDiv.innerText = "분석 중...";

            try {
                const imagePart = await fileToGenerativePart(fileInput.files[0]);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "이미지의 모든 텍스트를 추출해줘." }, imagePart] }]
                    })
                });

                const data = await response.json();

                // 디버깅: API가 보낸 전체 응답을 콘솔에 찍어봅니다.
                console.log("API Response:", data);

                if (!response.ok) {
                    throw new Error(`API 오류: ${data.error ? data.error.message : response.statusText}`);
                }

                if (data.candidates && data.candidates[0].content) {
                    resultDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.innerHTML = `<span class="error">응답 구조에 문제가 있습니다. 콘솔을 확인하세요.</span>`;
                }

            } catch (error) {
                console.error("Error details:", error);
                resultDiv.innerHTML = `<span class="error">오류 발생: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
