<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Name Extractor</title>
    <style>
        :root { --primary: #007bff; --bg: #121212; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        video { width: 100%; border-radius: 16px; background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        button:disabled { background: #444; cursor: not-allowed; }
        #resultContainer { margin-top: 25px; padding: 20px; background: #1e1e1e; border-radius: 16px; text-align: left; border: 1px solid #333; }
        .result-title { color: var(--primary); font-size: 14px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        #resultText { font-size: 20px; line-height: 1.6; white-space: pre-wrap; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 10px;">👤 Name Extractor</h2>
    <p style="color: #888; margin-bottom: 20px;">이름이 있는 곳에 카메라를 비춰주세요.</p>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="captureBtn">이름만 추출하기</button>
    </div>

    <div id="resultContainer">
        <div class="result-title">Detected Names</div>
        <div id="resultText">대기 중...</div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const resultText = document.getElementById('resultText');

    // API 설정
    const API_KEY = "AIzaSyBlj3Vhwbys_DtlZI9mIlL76MiEe5AOWDI"; 
    const MODEL = "gemini-1.5-flash"; 
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

    // 1. 카메라 스트림 시작
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            resultText.innerText = "카메라를 켤 수 없습니다: " + err.message;
        }
    }

    // 2. 촬영 및 이름 추출 요청
    async function extractNames() {
        captureBtn.disabled = true;
        resultText.innerText = "이름 찾는 중...";
        resultText.style.color = "#aaa";

        // 현재 화면 캡처
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { 
                                text: "이 이미지에서 '사람의 이름'만 찾아서 추출해줘. 불필요한 설명이나 인사를 제외하고 오직 이름만 리스트 형태로 답변해줘. 만약 이름이 여러 개라면 줄바꿈으로 구분해줘." 
                            },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }],
                    generationConfig: {
                        temperature: 0.1, // 정확도를 높이기 위해 창의성 억제
                        maxOutputTokens: 100
                    }
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const names = data.candidates[0].content.parts[0].text.trim();
                resultText.innerText = names || "이름을 찾지 못했습니다.";
                resultText.style.color = "#fff";
            } else {
                resultText.innerText = "결과가 없습니다.";
            }
        } catch (error) {
            resultText.innerText = "오류: " + error.message;
        } finally {
            captureBtn.disabled = false;
        }
    }

    captureBtn.addEventListener('click', extractNames);
    startCamera();
</script>

</body>
</html>
