<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini 웹 OCR</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #result { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 20px; min-height: 100px; }
        .preview { max-width: 300px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h1>Gemini API OCR 테스트</h1>
    
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="runOCR()">텍스트 추출하기</button>
    
    <br>
    <img id="previewImage" class="preview">
    
    <div id="result">이미지를 선택하고 버튼을 누르면 결과가 여기에 나타납니다.</div>

    <script>
        // ⚠️ 주의: 실제 서비스 시에는 API 키를 서버에 숨겨야 합니다.
        const API_KEY = "AIzaSyBlj3Vhwbys_DtlZI9mIlL76MiEe5AOWDI"; 
        const MODEL_NAME = "gemini-1.5-flash";

        // 파일을 Base64로 변환하는 함수
        async function fileToGenerativePart(file) {
            const base64EncodedDataPromise = new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            return {
                inline_data: { data: await base64EncodedDataPromise, mime_type: file.type },
            };
        }

        async function runOCR() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');
            const previewImg = document.getElementById('previewImage');

            if (fileInput.files.length === 0) {
                alert("이미지를 먼저 선택해주세요.");
                return;
            }

            const file = fileInput.files[0];
            
            // 미리보기 표시
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';

            resultDiv.innerText = "분석 중입니다... 잠시만 기다려 주세요.";

            try {
                const imagePart = await fileToGenerativePart(file);
                const prompt = "이 이미지 속의 모든 글자를 읽어서 텍스트로 출력해줘.";

                // API 요청 생성
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, imagePart] }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                resultDiv.innerText = text;
            } catch (error) {
                console.error(error);
                resultDiv.innerText = "오류가 발생했습니다: " + error.message;
            }
        }
    </script>
</body>
</html>
