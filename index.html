<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간이 웹 OCR 도구</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #result { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 5px; min-height: 100px; border: 1px solid #ddd; }
        .controls { margin-bottom: 20px; }
        #preview { max-width: 300px; display: block; margin-top: 10px; border: 1px dashed #ccc; }
        .loading { color: blue; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🖼️ 웹 이미지 텍스트 추출 (OCR)</h2>
    
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <p>지원 언어: <strong>한국어(kor) + 영어(eng)</strong></p>
    </div>

    <img id="preview" src="" alt="이미지 미리보기" style="display:none;">
    
    <h3>추출 결과:</h3>
    <div id="status" class="loading"></div>
    <div id="result">이미지를 선택하면 이곳에 텍스트가 표시됩니다.</div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 이미지 미리보기 처리
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                
                // 2. OCR 실행
                recognizeText(event.target.result);
            };
            reader.readAsDataURL(file);
        });

        async function recognizeText(imageSrc) {
            statusDiv.textContent = '텍스트를 분석 중입니다... 잠시만 기다려주세요.';
            resultDiv.textContent = '';

            try {
                // Tesseract 실행 (한국어와 영어 동시 인식)
                const result = await Tesseract.recognize(
                    imageSrc,
                    'kor+eng', 
                    { logger: m => {
                        if(m.status === 'recognizing text') {
                            statusDiv.textContent = `인식 진행률: ${Math.round(m.progress * 100)}%`;
                        }
                    }}
                );

                // 3. 결과 출력
                statusDiv.textContent = '인식 완료!';
                resultDiv.textContent = result.data.text;
            } catch (error) {
                console.error(error);
                statusDiv.textContent = '오류가 발생했습니다.';
                resultDiv.textContent = '인식에 실패했습니다.';
            }
        }
    </script>
</body>
</html>
