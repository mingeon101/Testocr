<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Firebase Student Lookup</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        .section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { background: #f8f9fa; padding: 15px; border-radius: 4px; white-space: pre-wrap; }
        h2 { margin-top: 0; color: #333; }
    </style>
</head>
<body>

    <h2>══════════════════<br>STUDENT LOOKUP SYSTEM<br>══════════════════</h2>

    <div class="section">
        <h3>학생 등록</h3>
        <input type="text" id="uid" placeholder="UID (예: 2024001)">
        <input type="text" id="name" placeholder="이름 (예: 홍길동)">
        <input type="number" id="grade" placeholder="학년">
        <input type="number" id="class" placeholder="반">
        <input type="number" id="number" placeholder="번호">
        <button onclick="addStudent()">학생 정보 저장</button>
    </div>

    <div class="section">
        <h3>이름으로 검색</h3>
        <input type="text" id="searchName" placeholder="검색할 이름을 입력하세요">
        <button onclick="lookupStudent()">조회하기</button>
        <div id="result">검색 결과가 여기에 표시됩니다.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, query, orderByChild, equalTo } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 설정 (본인의 Config 정보가 있다면 교체하세요)
        const firebaseConfig = {
            databaseURL: "https://smart-cafeteria-8a2ce-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 1. 학생 추가 기능
        window.addStudent = function() {
            const uid = document.getElementById('uid').value;
            const data = {
                name: document.getElementById('name').value,
                grade: parseInt(document.getElementById('grade').value),
                class: parseInt(document.getElementById('class').value),
                number: parseInt(document.getElementById('number').value)
            };

            if(!uid || !data.name) return alert("UID와 이름을 입력하세요!");

            set(ref(database, 'students/' + uid), data)
                .then(() => {
                    alert("성공적으로 저장되었습니다!");
                    document.querySelectorAll('input').forEach(i => i.value = "");
                })
                .catch(err => alert("에러 발생: " + err.message));
        };

        // 2. 학생 검색 기능
        window.lookupStudent = function() {
            const searchName = document.getElementById('searchName').value;
            const studentsRef = ref(database, 'students');
            const nameQuery = query(studentsRef, orderByChild('name'), equalTo(searchName));

            get(nameQuery).then((snapshot) => {
                if (snapshot.exists()) {
                    let output = `🔍 '${searchName}' 검색 결과:\n\n`;
                    const data = snapshot.val();
                    for (let id in data) {
                        output += `[UID: ${id}]\n`;
                        output += `📍 정보: ${data[id].grade}학년 ${data[id].class}반 ${data[id].number}번\n\n`;
                    }
                    document.getElementById('result').innerText = output;
                } else {
                    document.getElementById('result').innerText = "❌ 검색 결과가 없습니다.";
                }
            }).catch(err => {
                document.getElementById('result').innerText = "에러: " + err.message;
            });
        };
    </script>
</body>
</html>
