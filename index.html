<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR — 이미지에서 텍스트 추출</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6cff;
    --accent2: #ff6cb2;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --success: #4ade80;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(124,108,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 48px 24px 0;
    position: relative;
    z-index: 1;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  main {
    width: 100%;
    max-width: 800px;
    padding: 32px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 56px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,108,255,0.04), rgba(255,108,178,0.04));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .drop-zone:hover::after, .drop-zone.dragover::after {
    opacity: 1;
  }

  .drop-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    transition: transform 0.25s;
  }

  .drop-zone:hover .drop-icon {
    transform: scale(1.1) translateY(-2px);
  }

  .drop-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .drop-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .drop-btn {
    background: linear-gradient(135deg, var(--accent), #5e4fff);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    position: relative;
    z-index: 1;
  }

  .drop-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  #fileInput { display: none; }

  /* Preview */
  .preview-section {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .preview-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .preview-img-wrap {
    padding: 16px;
    display: flex;
    justify-content: center;
    background: #050508;
  }

  #previewImg {
    max-width: 100%;
    max-height: 320px;
    border-radius: 8px;
    object-fit: contain;
    display: block;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active {
    background: rgba(124,108,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  /* Extract button */
  .extract-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .extract-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .extract-btn:hover::before { opacity: 1; }
  .extract-btn:active { transform: scale(0.99); }
  .extract-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Result */
  .result-section {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .result-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .copy-btn:hover { border-color: var(--success); color: var(--success); }

  #resultText {
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    font-family: 'Space Mono', monospace;
    max-height: 400px;
    overflow-y: auto;
  }

  #resultText::-webkit-scrollbar { width: 6px; }
  #resultText::-webkit-scrollbar-track { background: transparent; }
  #resultText::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    display: none;
    padding: 16px 20px;
    background: rgba(255, 80, 80, 0.08);
    border: 1px solid rgba(255, 80, 80, 0.25);
    border-radius: var(--radius);
    color: #ff8080;
    font-size: 13px;
    line-height: 1.6;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Util */
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-text">OCR.AI</span>
    <span class="logo-badge">POWERED BY CLAUDE</span>
  </div>
  <p class="subtitle">이미지를 업로드하면 텍스트를 자동으로 추출합니다</p>
</header>

<main>
  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">🖼️</div>
    <div class="drop-title">이미지를 드래그하거나 클릭해서 업로드</div>
    <div class="drop-sub">PNG, JPG, WEBP, GIF 지원<br>스크린샷, 문서, 사진 등 모두 가능</div>
    <button class="drop-btn" onclick="document.getElementById('fileInput').click()">파일 선택</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- Image Preview -->
  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <span class="preview-label">미리보기</span>
      <button class="clear-btn" id="clearBtn">✕ 제거</button>
    </div>
    <div class="preview-img-wrap">
      <img id="previewImg" src="" alt="미리보기">
    </div>
  </div>

  <!-- Mode Selector -->
  <div class="mode-bar" id="modeBar" style="display:none">
    <button class="mode-btn active" data-mode="text">📄 텍스트 추출</button>
    <button class="mode-btn" data-mode="table">📊 표 구조 유지</button>
    <button class="mode-btn" data-mode="translate">🌐 추출 후 번역</button>
    <button class="mode-btn" data-mode="summary">✨ 추출 후 요약</button>
  </div>

  <!-- Extract Button -->
  <button class="extract-btn" id="extractBtn" style="display:none" onclick="extractText()">
    텍스트 추출하기
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>AI가 이미지를 분석하고 있어요...</span>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-label">
        <div class="result-dot"></div>
        추출 결과
      </div>
      <button class="copy-btn" onclick="copyText()">📋 복사</button>
    </div>
    <div id="resultText"></div>
  </div>
</main>

<div class="toast" id="toast">클립보드에 복사됐어요!</div>

<script>
  let imageBase64 = null;
  let imageType = null;
  let currentMode = 'text';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewSection = document.getElementById('previewSection');
  const previewImg = document.getElementById('previewImg');
  const modeBar = document.getElementById('modeBar');
  const extractBtn = document.getElementById('extractBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const resultSection = document.getElementById('resultSection');
  const resultText = document.getElementById('resultText');

  // Drag & Drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });
  dropZone.addEventListener('click', e => {
    if (!e.target.classList.contains('drop-btn')) fileInput.click();
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
    });
  });

  // Clear
  document.getElementById('clearBtn').addEventListener('click', () => {
    imageBase64 = null;
    imageType = null;
    fileInput.value = '';
    previewSection.style.display = 'none';
    modeBar.style.display = 'none';
    extractBtn.style.display = 'none';
    resultSection.style.display = 'none';
    errorBox.style.display = 'none';
  });

  function loadImage(file) {
    imageType = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      const result = e.target.result;
      imageBase64 = result.split(',')[1];
      previewImg.src = result;
      previewSection.style.display = 'block';
      modeBar.style.display = 'flex';
      extractBtn.style.display = 'block';
      resultSection.style.display = 'none';
      errorBox.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  const prompts = {
    text: `이 이미지에서 모든 텍스트를 정확하게 추출해주세요. 원본 줄바꿈과 단락 구조를 최대한 유지하고, 텍스트만 출력하세요. (설명 없이 텍스트만)`,
    table: `이 이미지에 있는 텍스트를 추출하되, 표나 구조화된 데이터가 있다면 그 구조를 텍스트로 최대한 표현해주세요. 텍스트와 표 내용만 출력하세요.`,
    translate: `이 이미지에서 텍스트를 추출한 뒤, 한국어로 번역해서 보여주세요. 형식: [원문]\n...\n[번역]\n...`,
    summary: `이 이미지에서 텍스트를 추출한 뒤, 핵심 내용을 한국어로 요약해주세요. 형식: [추출 텍스트]\n...\n[요약]\n...`
  };

  async function extractText() {
    if (!imageBase64) return;

    loading.style.display = 'flex';
    resultSection.style.display = 'none';
    errorBox.style.display = 'none';
    extractBtn.disabled = true;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: imageType,
                  data: imageBase64
                }
              },
              {
                type: 'text',
                text: prompts[currentMode]
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API 오류 (${response.status})`);
      }

      const data = await response.json();
      const text = data.content.map(c => c.text || '').join('\n').trim();

      resultText.textContent = text || '(텍스트를 찾지 못했습니다)';
      resultSection.style.display = 'block';

    } catch (err) {
      errorBox.textContent = '오류: ' + err.message;
      errorBox.style.display = 'block';
    } finally {
      loading.style.display = 'none';
      extractBtn.disabled = false;
    }
  }

  function copyText() {
    const text = resultText.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
</script>
</body>
</html>
